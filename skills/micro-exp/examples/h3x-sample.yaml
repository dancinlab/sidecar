# Example manifest: H₃X N5 funnel sweep (wave-1 = group-15 completion + group-13 entry)
# Use: /micro-exp examples/h3x-sample.yaml
#
# Maps to: ~/etc/rtsc-results/<id>/ (this repo's prior campaign convention) +
#          parse_template=rtsc-h3x-elph (extracts lambda_BZ + omega_log from
#          QE ph.x electron_phonon='simple' output, computes Allen-Dynes Tc for
#          mu*=0.10/0.13, runs `hexa verify --expr allen_dynes_tc`, scans dyn
#          files for imaginary modes, writes exports/sweep/<batch>/<id>.json
#          mirroring exports/material_discovery/rtsc_*_dft_*.json).

batch_id: rtsc-h3x-sweep-2026-05-25
host_class: vast-gpu

budget:
  pod_concurrent_max: 4      # honor parallel-agent-cap memory; ≤8 vast slots
  usd_max_per_week: 100      # paired with `hexa cloud --max-price` (upstream TODO)

candidates:
  # group 15 completion (h3n/h3p/h3as already in flight; sb/bi to complete the trend)
  - id: h3sb
    kind: dft-elph
    inputs_dir: ~/etc/rtsc-results/h3sb/
    pseudo_dir: ~/etc/rtsc-results/h3sb/pseudo/
    parser_template: rtsc-h3x-elph
    structure_hint: Im-3m

  - id: h3bi
    kind: dft-elph
    inputs_dir: ~/etc/rtsc-results/h3bi/
    pseudo_dir: ~/etc/rtsc-results/h3bi/pseudo/
    parser_template: rtsc-h3x-elph
    structure_hint: Im-3m

  # group 13 entry (untouched group — h3b lightest, h3al next)
  - id: h3b
    kind: dft-elph
    inputs_dir: ~/etc/rtsc-results/h3b/
    pseudo_dir: ~/etc/rtsc-results/h3b/pseudo/
    parser_template: rtsc-h3x-elph
    structure_hint: Im-3m

  - id: h3al
    kind: dft-elph
    inputs_dir: ~/etc/rtsc-results/h3al/
    pseudo_dir: ~/etc/rtsc-results/h3al/pseudo/
    parser_template: rtsc-h3x-elph
    structure_hint: Im-3m

  # queued (wave 2 — fired when wave 1 pods free up)
  - id: h3ga
    kind: dft-elph
    inputs_dir: ~/etc/rtsc-results/h3ga/
    pseudo_dir: ~/etc/rtsc-results/h3ga/pseudo/
    parser_template: rtsc-h3x-elph
    structure_hint: Im-3m

  - id: h3sn
    kind: dft-elph
    inputs_dir: ~/etc/rtsc-results/h3sn/
    pseudo_dir: ~/etc/rtsc-results/h3sn/pseudo/
    parser_template: rtsc-h3x-elph
    structure_hint: Im-3m
